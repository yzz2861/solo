<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物业维修闭环管理系统</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>🏠 物业维修闭环管理系统</h1>
      <div class="header-actions">
        <button id="btnExportReport" class="btn btn-primary">📊 导出闭环报告</button>
        <button id="btnClearAll" class="btn btn-danger">🗑️ 清空数据</button>
      </div>
    </header>

    <div class="main-content">
      <aside class="sidebar">
        <div class="panel">
          <h2>📁 数据导入</h2>
          
          <div class="import-section">
            <label class="import-label">
              <span>报修单 (CSV)</span>
              <input type="file" id="fileRepair" accept=".csv" />
            </label>
            <div class="import-hint">列：维修单号,报修日期,小区名称,报修人,报修内容,联系电话</div>
          </div>

          <div class="import-section">
            <label class="import-label">
              <span>备件领用 (JSON)</span>
              <input type="file" id="fileParts" accept=".json" />
            </label>
            <div class="import-hint">格式：[{维修单号, 领用日期, 领用人, 备件:[{名称,数量,单价}]}]</div>
          </div>

          <div class="import-section">
            <label class="import-label">
              <span>完工记录 (CSV)</span>
              <input type="file" id="fileComplete" accept=".csv" />
            </label>
            <div class="import-hint">列：维修单号,完工日期,完工人,完工说明,用时(小时)</div>
          </div>

          <button id="btnImportDemo" class="btn btn-outline btn-block">📋 加载示例数据</button>
        </div>

        <div class="panel">
          <h2>🔍 筛选条件</h2>
          
          <div class="filter-section">
            <label>小区筛选</label>
            <select id="filterCommunity">
              <option value="">全部小区</option>
            </select>
          </div>

          <div class="filter-section">
            <label>状态筛选</label>
            <select id="filterStatus">
              <option value="">全部状态</option>
              <option value="pending">待领料</option>
              <option value="picked">已领料待完工</option>
              <option value="completed">已完工待复核</option>
              <option value="reviewed">已复核</option>
            </select>
          </div>

          <div class="filter-section">
            <label>异常筛选</label>
            <div class="checkbox-group">
              <label><input type="checkbox" id="filterInsufficient" /> 备件不足</label>
              <label><input type="checkbox" id="filterWorkerMismatch" /> 完工人不一致</label>
              <label><input type="checkbox" id="filterUncompleted" /> 领用未完工</label>
              <label><input type="checkbox" id="filterDuplicate" /> 重复领用</label>
            </div>
          </div>

          <div class="filter-section">
            <label>搜索维修单号</label>
            <input type="text" id="searchOrder" placeholder="输入维修单号搜索..." />
          </div>

          <button id="btnResetFilter" class="btn btn-outline btn-block">重置筛选</button>
        </div>

        <div class="panel stats-panel">
          <h2>📈 数据统计</h2>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-value" id="statTotal">0</div>
              <div class="stat-label">总工单</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statPending">0</div>
              <div class="stat-label">待领料</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statPicked">0</div>
              <div class="stat-label">施工中</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statCompleted">0</div>
              <div class="stat-label">待复核</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statReviewed">0</div>
              <div class="stat-label">已复核</div>
            </div>
            <div class="stat-item warning">
              <div class="stat-value" id="statIssues">0</div>
              <div class="stat-label">异常单</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="content">
        <div class="toolbar">
          <div class="toolbar-left">
            <span class="result-count">共 <strong id="resultCount">0</strong> 条记录</span>
          </div>
          <div class="toolbar-right">
            <select id="sortBy">
              <option value="date_desc">按报修日期↓</option>
              <option value="date_asc">按报修日期↑</option>
              <option value="order_asc">按单号↑</option>
              <option value="order_desc">按单号↓</option>
            </select>
          </div>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>维修单号</th>
                <th>小区</th>
                <th>报修内容</th>
                <th>报修人</th>
                <th>领料状态</th>
                <th>完工状态</th>
                <th>复核状态</th>
                <th>异常标记</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="9" class="empty-state">
                  <div class="empty-icon">📂</div>
                  <p>暂无数据，请先导入报修单、领用记录和完工记录</p>
                  <button class="btn btn-primary" onclick="document.getElementById('fileRepair').click()">导入报修单</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <div id="detailModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">维修单详情</h2>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBody">
        </div>
        <div class="modal-footer" id="modalFooter">
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
