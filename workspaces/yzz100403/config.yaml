risk_levels:
  critical:
    weight: 100
    description: 严重风险，立即处理
    examples:
      - 公共目录发现薪资表
      - 根目录777权限
      - 客户名单对外公开
  high:
    weight: 75
    description: 高风险，优先处理
    examples:
      - 敏感文件权限过宽
      - 外链无过期时间
      - 离职员工文件夹无人接管
  medium:
    weight: 50
    description: 中风险，计划处理
    examples:
      - 文件名不规范
      - 权限信息缺失
      - 旧部门缩写
  low:
    weight: 25
    description: 低风险，按需处理
    examples:
      - 文件名包含空格
      - 中文括号
      - 格式不统一

