metadata_files:
  pattern: ".{name}.meta"
  fields:
    - owner
    - department
    - permission_desc
    - expiry_date
    - last_audit

permission_rules:
  overly_broad:
    - "777"
    - "rwxrwxrwx"
    - "everyone:read"
    - "everyone:write"
    - "everyone:full"
    - "public:read"
    - "public:write"
    - "公开"
    - "所有人可编辑"
    - "公司全员"
    - "内部公开"
    - "权限:公开"
    - "权限:全员"
  no_owner:
    - "unknown owner"
    - "无负责人"
    - "owner: none"
    - "创建者已离职"
    - "unowned"
    - "负责人: 无"
    - "owner: unknown"
  external_share:
    - "externally shared"
    - "外部链接"
    - "anyone with link"
    - "链接分享"
    - "外部分享"
    - "对外公开"
    - "共享状态:外部"
  permission_missing:
    - "unknown"
    - "未设置"
    - "权限未知"
    - "n/a"
    - "none"
    - "权限: 未设置"

