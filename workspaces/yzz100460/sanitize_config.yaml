# ============================================================
# 日志压缩脱敏脚本 - 配置文件
# 注意：正则 pattern 使用 YAML literal block（|） 避免转义问题
# ============================================================

# --- 扫描与分组 ---
scan:
  input_dir: "./logs_raw"
  output_dir: "./archives"
  audit_dir: "./audit_samples"
  extensions:
    - .log
    - .out
    - .txt
  recursive: true

# 分组策略
grouping:
  date_patterns:
    - |
      \b(20\d{2})[-_./](\d{1,2})[-_./](\d{1,2})\b
    - |
      \b(20\d{2})(\d{2})(\d{2})\b
  service_pattern: |
    ^([a-zA-Z0-9_-]+?)(?:[-_.]\d|[-_.]log|$)
  default_service: "unknown-service"
  default_date: "unknown-date"

# --- 脱敏规则 ---
sanitize:
  placeholder: "***MASKED***"

  rules:
    - name: "手机号-中国大陆"
      pattern: |
        (?<!\d)(1[3-9]\d{9})(?!\d)
      enabled: true

    - name: "Bearer Token"
      pattern: |
        (?i)(bearer\s+)[A-Za-z0-9\-._~+/]{20,}={0,2}
      replacement: |
        \g<1>***MASKED***
      enabled: true

    - name: "Authorization Header"
      pattern: |
        (?i)(authorization[:\s]+)[A-Za-z0-9\-._~+/=,\s"]{8,}
      replacement: |
        \g<1>***MASKED***
      enabled: true

    - name: "JWT Token"
      pattern: |
        (?<!\w)(eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,})(?!\w)
      enabled: true

    - name: "API Key / Secret"
      pattern: |
        (?i)(api[-_]?key|api[-_]?secret|secret[-_]?key|access[-_]?key|secret)[=:"\s]+([A-Za-z0-9\-_.]{8,})
      replacement: |
        \g<1>=***MASKED***
      enabled: true

    - name: "Cookie / Session ID"
      pattern: |
        (?i)(cookie|session[-_]?id|sid|jsessionid|session)[:=][\s"]*([A-Za-z0-9\-_.]{8,})
      replacement: |
        \g<1>=***MASKED***
      enabled: true

    - name: "身份证号-18位"
      pattern: |
        (?<!\d)([1-9]\d{5}(?:19|20)\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\d|3[01])\d{3}[\dXx])(?!\d)
      enabled: true

    - name: "银行卡号"
      pattern: |
        (?<!\d)(\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{1,4})(?!\d)
      enabled: true

    - name: "邮箱地址"
      pattern: |
        (?<![\w.-])([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,})(?![\w.-])
      enabled: true

    - name: "URL中的token参数"
      pattern: |
        (?i)([?&](?:token|access_token|refresh_token|auth|key|secret|apikey|sid)=)([^&\s"'<>]+)
      replacement: |
        \g<1>***MASKED***
      enabled: true

    - name: "JSON 敏感字段通用"
      pattern: |
        (?i)("(?:password|passwd|pwd|token|secret|private_key|privateKey|accessToken|refreshToken|authToken)"\s*:\s*")([^"]{3,})(")
      replacement: |
        \g<1>***MASKED***\g<3>
      enabled: true

    - name: "日志格式 token"
      pattern: |
        (?i)(\b(?:token|accessToken|authToken|refreshToken)\b[=:\s]+)([A-Za-z0-9\-_.]{6,})
      replacement: |
        \g<1>***MASKED***
      enabled: true

    - name: "password 字段"
      pattern: |
        (?i)(\bpassword\b[=:\s]+)([^\s&"'<>]{3,})
      replacement: |
        \g<1>***MASKED***
      enabled: true

# --- 异常检测 ---
anomaly:
  max_line_length: 5000
  check_json_broken: true
  warn_no_match: true
  no_match_whitelist:
    - "metrics"
    - "access-log"
    - "health-check"

# --- 压缩与去重 ---
archive:
  format: "tar.gz"
  name_template: "{date}_{service}_{checksum}"
  checksum_algorithm: "sha256"
  checksum_suffix: ".sha256"
  keep_temp: false

# --- 审计（脱敏前后差异抽查） ---
audit:
  samples_per_group: 20
  only_matched_lines: true
  format: "json"
