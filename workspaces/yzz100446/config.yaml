inspection:
  timezone: "Asia/Shanghai"
  screenshot_timeout: 10
  online_timeout: 5
  consecutive_abnormal_days: 3
  output_dir: "./reports"
  screenshot_dir: "./reports/screenshots"
  history_file: "./reports/history.json"

calendar:
  type: "ics_url"
  ics_url: "https://calendar.example.com/room-schedule.ics"
  cache_ttl_minutes: 30
  cache_file: "./reports/calendar_cache.json"

report:
  title: "会议室屏幕巡检报告"
  company_name: "示例公司行政部"
