garbage_supervision:
  categories:
    - 可回收物
    - 有害垃圾
    - 厨余垃圾
    - 其他垃圾

  thresholds:
    可回收物:
      min_weight: 0
      max_weight: 500
    有害垃圾:
      min_weight: 0
      max_weight: 100
    厨余垃圾:
      min_weight: 0
      max_weight: 1000
    其他垃圾:
      min_weight: 0
      max_weight: 800

  required_fields:
    - record_id
    - community
    - building
    - unit
    - category
    - weight
    - timestamp
    - supervisor

  duplicate_check_fields:
    - record_id

  output:
    group_report: group_report.txt
    bad_data_list: bad_data_list.txt
    json_result: result.json
    review_table: review_table.csv
