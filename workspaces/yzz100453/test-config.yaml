    page_range: "+15"
    require_stamp: true

  # ---- 四、盖章版标书 ----
  - section: "四、盖章版标书"
    name: "技术标-盖章版PDF"
    category: "盖章版PDF"
    keywords: ["技术标", "盖章"]
    owner: "张工"
    require_stamp: true
    page_range: "80-120"

  - section: "四、盖章版标书"
    name: "商务标-盖章版PDF"
    category: "盖章版PDF"
    keywords: ["商务标"]
    owner: "李总"
    require_stamp: true
    page_range: "80-120"
