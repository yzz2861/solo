<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>无人机巡检飞行复盘工具</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-title">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
      <h1>无人机巡检飞行复盘</h1>
    </div>
    <div class="header-actions">
      <button id="btn-export-report" class="btn btn-primary" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出复盘报告
      </button>
      <button id="btn-clear-all" class="btn btn-danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        清空数据
      </button>
    </div>
  </header>

  <main class="app-main">
    <aside class="sidebar">
      <section class="panel">
        <h2 class="panel-title">数据导入</h2>
        <div class="upload-area" id="upload-route">
          <div class="upload-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1-5.1a2 2 0 0 0-2.8 0L5.3 8"/><path d="M19 13v6H5v-6"/></svg>
          </div>
          <div class="upload-text">
            <strong>航线 CSV</strong>
            <span>计划航线 / 实际飞行记录</span>
          </div>
          <input type="file" id="file-route" accept=".csv" multiple />
        </div>

        <div class="upload-area" id="upload-nofly">
          <div class="upload-icon nofly">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          </div>
          <div class="upload-text">
            <strong>禁飞区 GeoJSON</strong>
            <span>禁飞 / 限飞区域</span>
          </div>
          <input type="file" id="file-nofly" accept=".geojson,.json" multiple />
        </div>

        <div class="upload-area" id="upload-pilot">
          <div class="upload-icon pilot">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="upload-text">
            <strong>飞手补录 JSON</strong>
            <span>飞手记录 / 审批信息</span>
          </div>
          <input type="file" id="file-pilot" accept=".json" multiple />
        </div>
      </section>

      <section class="panel">
        <h2 class="panel-title">风险筛选</h2>
        <div class="filter-group">
          <label class="filter-item">
            <input type="checkbox" id="filter-nofly" checked />
            <span class="filter-dot dot-nofly"></span>
            <span>穿越禁飞区</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" id="filter-height" checked />
            <span class="filter-dot dot-height"></span>
            <span>高度超限</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" id="filter-person" checked />
            <span class="filter-dot dot-person"></span>
            <span>飞手/审批人不一致</span>
          </label>
          <label class="filter-item">
            <input type="checkbox" id="filter-reviewed" />
            <span class="filter-dot dot-reviewed"></span>
            <span>仅显示未复核</span>
          </label>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel-title">航线列表 <span class="badge" id="route-count">0</span></h2>
        <div class="route-list" id="route-list">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p>暂无航线数据</p>
            <small>请先导入 CSV 文件</small>
          </div>
        </div>
      </section>
    </aside>

    <section class="map-container">
      <div id="map"></div>
      <div class="map-legend">
        <h3>图例</h3>
        <div class="legend-item"><span class="legend-line plan"></span>计划航线</div>
        <div class="legend-item"><span class="legend-line actual"></span>实际航线</div>
        <div class="legend-item"><span class="legend-poly nofly"></span>禁飞区</div>
        <div class="legend-item"><span class="legend-dot risk"></span>风险点</div>
      </div>
    </section>

    <aside class="detail-panel">
      <section class="panel">
        <h2 class="panel-title">航线详情</h2>
        <div id="route-detail" class="route-detail">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <p>选择一条航线</p>
            <small>点击左侧列表查看详情</small>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel-title">风险点 <span class="badge badge-danger" id="risk-count">0</span></h2>
        <div id="risk-list" class="risk-list">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <p>暂无风险记录</p>
          </div>
        </div>
      </section>
    </aside>
  </main>

  <div class="modal" id="review-modal">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>风险复核</h3>
        <button class="modal-close" data-close>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="risk-summary" id="review-risk-summary"></div>
        <div class="form-group">
          <label>复核状态</label>
          <select id="review-status">
            <option value="pending">待复核</option>
            <option value="confirmed">确认违规</option>
            <option value="false_alarm">误报</option>
            <option value="approved">特殊审批</option>
          </select>
        </div>
        <div class="form-group">
          <label>复核意见</label>
          <textarea id="review-comment" rows="4" placeholder="请输入复核意见..."></textarea>
        </div>
        <div class="form-group">
          <label>复核人</label>
          <input type="text" id="reviewer" placeholder="请输入复核人姓名" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close>取消</button>
        <button class="btn btn-primary" id="btn-save-review">保存</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dataManager.js"></script>
  <script src="js/riskAnalyzer.js"></script>
  <script src="js/mapViewer.js"></script>
  <script src="js/reportExporter.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
